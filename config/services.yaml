services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    c975L\ContactFormBundle\Controller\:
        resource: '../src/Controller/*'

    c975L\ContactFormBundle\DataFixtures\:
        resource: '../src/DataFixtures/*'

    c975L\ContactFormBundle\Form\:
        resource: '../src/Form/*'

    c975L\ContactFormBundle\Form\ContactFormFactory:
        arguments:
            $cspListener: '@?nelmio_security.csp_listener'

    c975L\ContactFormBundle\Service\ContactFormService:
        arguments:
            $contactFormByIpLimiterFactory: '@?limiter.contact_form_by_ip'
            $contactFormByEmailLimiterFactory: '@?limiter.contact_form_by_email'

    c975L\ContactFormBundle\Service\:
        resource: '../src/Service/*'